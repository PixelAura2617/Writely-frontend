<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatNova AI 💬</title>

  <link rel="stylesheet" href="style.css">

  <!-- Monetag Verification -->
  <meta name="monetag" content="99f8b1410ece00bb799fc3d35f95c972">

  <!-- 🔥 PUSH ADS -->
  <script src="https://5gvci.com/act/files/tag.min.js?z=10831734" async></script>

  <!-- 🔥 ONCLICK ADS (SAFE LOAD) -->
  <script>
  window.addEventListener("load", function(){
    var s = document.createElement("script");
    s.src = "https://a15sm.com/tag.min.js";
    s.dataset.zone = "10830314";
    document.body.appendChild(s);
  });
  </script>

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="newChat()">+ New Chat</button>
    <div id="chatList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div class="header" style="display:flex; align-items:center; gap:10px;">
      <button onclick="toggleSidebar()">☰</button>

      <img src="logo.png" 
           style="width:35px; height:35px; border-radius:50%; object-fit:cover;">

      <h2 style="margin:0;">ChatNova AI</h2>
    </div>

    <!-- HOME -->
    <div id="homeScreen" class="home">
      <h1>Ask Anything 💬</h1>
      <p>Get instant smart answers in seconds 🚀</p>

      <p style="text-align:center; font-size:14px;">
        ⚡ Fast AI • No Login • Free
      </p>

      <p style="text-align:center;">
        Free messages left: <b id="limitCount">2</b>
      </p>

      <div class="quick-actions">
        <button onclick="setMsg('Hello 👋')">👋 Hello</button>
        <button onclick="setMsg('Tell me something interesting 🤔')">🤔 Idea</button>
        <button onclick="setMsg('Help me')">⚡ Help</button>
      </div>
    </div>

    <!-- LOCK -->
    <div id="limitBox" style="display:none; text-align:center; padding:20px;">
      <h3>🔒 Free limit reached</h3>
      <p>Unlock to continue chatting 👇</p>

      <button onclick="watchAd()" 
        style="background:#ff0033; color:white; padding:12px 20px; border:none; border-radius:8px;">
        🚀 Unlock Now
      </button>

      <p style="margin-top:10px;">Come back tomorrow for free messages 🔥</p>
    </div>

    <!-- CHAT -->
    <div id="chatBox" class="chat-box"></div>

    <!-- INPUT -->
    <div class="input-area">
      <textarea id="input" placeholder="Type your message..."></textarea>
      <button onclick="sendMessage()">Send</button>
      <button onclick="startVoice()">🎤</button>
      <button onclick="watchAd()">🎁</button>
    </div>

  </div>
</div>

<!-- 🔥 IN-PAGE PUSH -->
<script src="https://nap5k.com/tag.min.js?z=10831739"></script>

<!-- JS -->
<script src="script.js"></script>

<script>
function setMsg(text){
  document.getElementById('input').value = text;
}
</script>

</body>
</html>
