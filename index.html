<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatNova AI 💬</title>

  <link rel="stylesheet" href="style.css">

  <!-- Monetag Verification -->
  <meta name="monetag" content="99f8b1410ece00bb799fc3d35f95c972">

</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="newChat()">+ New Chat</button>
    <div id="chatList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- 🔥 HEADER (LOGO ADDED) -->
    <div class="header" style="display:flex; align-items:center; gap:10px;">
      <button onclick="toggleSidebar()">☰</button>

      <!-- LOGO -->
      <img src="logo.png" 
           style="width:35px; height:35px; border-radius:50%; object-fit:cover;">

      <h2 style="margin:0;">ChatNova AI</h2>
    </div>

    <!-- HOME -->
    <div id="homeScreen" class="home">
      <h1>Chat with AI 💬</h1>
      <p>Your smart assistant anytime 🚀</p>

      <div class="quick-actions">
        <button onclick="setMsg('Hello 👋')">👋 Hello</button>
        <button onclick="setMsg('Tell me something interesting 🤔')">🤔 Idea</button>
        <button onclick="setMsg('Help me')">⚡ Help</button>
      </div>
    </div>

    <!-- LOCK -->
    <div id="limitBox" style="display:none; text-align:center; padding:20px;">
      <h3>🔒 Limit Reached</h3>
      <p>Unlock more messages 👇</p>
      <button onclick="watchAd()">🚀 Unlock</button>
    </div>

    <!-- CHAT -->
    <div id="chatBox" class="chat-box"></div>

    <!-- INPUT -->
    <div class="input-area">
      <textarea id="input" placeholder="Type your message..."></textarea>
      <button onclick="sendMessage()">Send</button>
      <button onclick="startVoice()">🎤</button>
      <button onclick="watchAd()">🎁</button>
    </div>

  </div>
</div>

<!-- 💥 MONETAG ONCLICK (FIXED SCRIPT) -->
<script>
(function(s){
  s.dataset.zone='10830314';
  s.src='https://a15sm.com/tag.min.js'; // ✅ fixed (pehle galat tha)
  (document.body || document.documentElement).appendChild(s);
})(document.createElement('script'));
</script>

<!-- JS -->
<script src="script.js"></script>

<script>
function setMsg(text){
  document.getElementById('input').value = text;
}
</script>

</body>
</html>
