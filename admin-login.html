<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Writely AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: #1e293b;
}

.header button {
  background: #ef4444;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

/* CONTAINER */
.container { padding: 20px; }

/* STATS */
.stats { display: flex; gap: 15px; margin-bottom: 20px; }

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  text-align: center;
}

/* USER CARD */
.user-card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.user-card button {
  margin-right: 10px;
  margin-top: 8px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn-premium { background: #22c55e; }
.btn-delete { background: #ef4444; }
.btn-clear { background: #f59e0b; }
</style>
</head>

<body>

<script>
// 🔒 ADMIN PROTECTION
if (!localStorage.getItem("adminToken")) {
  window.location.href = "admin-login.html";
}
</script>

<div class="header">
  <h1>⚙️ Admin Panel</h1>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="stats">
  <div class="card"><h3 id="totalUsers">0</h3><p>Total Users</p></div>
  <div class="card"><h3 id="premiumUsers">0</h3><p>Premium</p></div>
  <div class="card"><h3 id="freeUsers">0</h3><p>Free</p></div>
</div>

<div id="userList"></div>

</div>

<script>
const API = "https://writely-backend-x2y0.onrender.com";
const TOKEN = localStorage.getItem("adminToken");

// LOAD USERS
async function loadUsers() {
  let res = await fetch(API + "/admin/users", {
    headers: { "Authorization": TOKEN }
  });

  let data = await res.json();
  showUsers(data);
}

// SHOW USERS
function showUsers(data) {
  let list = document.getElementById("userList");
  list.innerHTML = "";

  data.forEach(u => {
    list.innerHTML += `
      <div class="user-card">
        <b>${u.email}</b><br>
        ${u.premium ? "💎 Premium" : "Free"}<br>

        <button class="btn-premium" onclick="togglePremium('${u.email}')">Toggle</button>
        <button class="btn-delete" onclick="deleteUser('${u.email}')">Delete</button>
        <button class="btn-clear" onclick="clearChat('${u.email}')">Clear Chat</button>
      </div>
    `;
  });
}

// ACTIONS
async function togglePremium(email) {
  await fetch(API + "/admin/toggle-premium", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": TOKEN
    },
    body: JSON.stringify({ email })
  });

  loadUsers();
}

async function deleteUser(email) {
  if (!confirm("Delete user?")) return;

  await fetch(API + "/admin/delete-user", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": TOKEN
    },
    body: JSON.stringify({ email })
  });

  loadUsers();
}

async function clearChat(email) {
  await fetch(API + "/admin/clear-chat", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": TOKEN
    },
    body: JSON.stringify({ email })
  });

  alert("Chat cleared");
}

// STATS
async function loadStats() {
  let res = await fetch(API + "/admin/stats", {
    headers: { "Authorization": TOKEN }
  });

  let data = await res.json();

  document.getElementById("totalUsers").innerText = data.totalUsers;
  document.getElementById("premiumUsers").innerText = data.premiumUsers;
  document.getElementById("freeUsers").innerText = data.freeUsers;
}

// LOGOUT
function logout() {
  localStorage.removeItem("adminToken");
  window.location.href = "admin-login.html";
}

// INIT
loadUsers();
loadStats();
</script>

</body>
</html>
